<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #05020c;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            position: relative;
        }
        
        /* تأثير خلفية الجالكسي المظلمة */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b0c30 0%, #05020c 70%);
            z-index: 0;
        }

        /* إطار النيون المضيء مثل الفيديو */
        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 85vh;
            border: 3px solid #ff2a74;
            border-radius: 25px;
            box-shadow: 0 0 25px #ff2a74, inset 0 0 25px #ff2a74;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            z-index: 2;
            overflow: hidden;
            background: rgba(5, 2, 12, 0.6);
            backdrop-filter: blur(1px);
        }

        /* نصوص النيون المتوهجة */
        .title {
            font-size: 2.8rem;
            font-weight: bold;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff2a74, 0 0 20px #ff2a74, 0 0 40px #ff2a74;
            animation: pulse 2s infinite alternate;
        }

        .subtitle {
            font-size: 1.2rem;
            text-align: center;
            color: #ffb7ce;
            text-shadow: 0 0 5px #ffb7ce, 0 0 10px #ff7597;
            margin-top: 10px;
        }

        .footer-text {
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 15px #00f0ff;
            text-align: center;
        }

        /* القلب المركزي النابض */
        .heart-center {
            position: relative;
            width: 150px;
            height: 150px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-heart {
            font-size: 5.5rem;
            animation: beat 1.2s infinite;
            filter: drop-shadow(0 0 20px #ff2a74);
            cursor: pointer;
            z-index: 5;
            user-select: none;
        }

        /* الرموز التعبيرية المتحركة في أرجاء الشاشة */
        .sticker {
            position: absolute;
            font-size: 2.8rem;
            user-select: none;
            pointer-events: none;
            z-index: 3;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.7));
        }

        /* جزيئات القلوب المتناثرة في الخلفية */
        .particle {
            position: absolute;
            user-select: none;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes beat {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        /* تحديد حركة كل ملصق (سبايدرمان والقطة والقلوب) */
        .sk1 { top: 15%; left: 8%; animation: floatSide 4s ease-in-out infinite alternate; }
        .sk2 { top: 25%; right: 8%; animation: floatSide 5s ease-in-out infinite alternate-reverse; }
        .sk3 { bottom: 20%; left: 12%; animation: floatSide 4.5s ease-in-out infinite alternate; }
        .sk4 { bottom: 25%; right: 10%; animation: floatSide 3.8s ease-in-out infinite alternate-reverse; }

        @keyframes floatSide {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(15deg); }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <div class="title">الي افضل صديق/ة❤️</div>
        
        <div class="subtitle">كل ماغبت عني بشتاق </div>

        <div class="heart-center">
            <div class="main-heart" onclick="createBurst(); setTimeout(() => { window.location.href = 'secret.html'; }, 800)">💖</div>
        </div>

        <div class="sticker sk1">🕷️</div>
        <div class="sticker sk2">🐱</div>
        <div class="sticker sk3">❤️</div>
        <div class="sticker sk4">✨</div>

        <div class="footer-text">الازبايدر مان خرب الدنيا ياجدعان </div>
    </div>

    <script>
        // دالة توليد القلوب العشوائية المتساقطة في الخلفية
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const shapes = ['❤️', '💖', '✨', '🌸', '💕'];
            particle.innerText = shapes[Math.floor(Math.random() * shapes.length)];
            particle.style.fontSize = (Math.random() * 15 + 12) + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
            
            document.body.appendChild(particle);
            
            setTimeout(() => { particle.remove(); }, 5000);
        }

        setInterval(createParticle, 250);

        // تأثير انفجار القلوب عند الضغط على القلب الكبير
        function createBurst() {
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerText = '❤️';
                p.style.left = '50vw';
                p.style.top = '50vh';
                p.style.transition = 'all 0.8s ease-out';
                p.style.position = 'absolute';
                p.style.zIndex = '10';
                
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 180 + 60;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;
                
                setTimeout(() => {
                    p.style.transform = `translate(${x}px, ${y}px) scale(0)`;
                    p.style.opacity = '0';
                }, 30);
                
                setTimeout(() => { p.remove(); }, 900);
            }
        }
    </script>
</body>
</html>
